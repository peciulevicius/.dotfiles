site_name: Džiugas' Dotfiles
site_description: Cross-platform dotfiles — macOS, Linux, and Windows. Claude Code setup, modern CLI tools, and development environment.
site_url: https://docs.peciulevicius.com

repo_name: peciulevicius/.dotfiles
repo_url: https://github.com/peciulevicius/.dotfiles

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Start Here: START_HERE.md

  - Setup:
      - How to Install: HOW_TO_INSTALL.md
      - Mac mini Setup: HOME_SERVER.md

  - Claude Code:
      - Claude Code Guide: CLAUDE_CODE_GUIDE.md

  - Tools:
      - Modern CLI Tools: MODERN_CLI_TOOLS.md
      - Utility Scripts: UTILITY_SCRIPTS.md
      - Tutorials: tutorials/TOOL_TUTORIALS.md

  - Self-Hosted:
      - Services Overview: SERVICES.md
      - Notes & Obsidian: guides/NOTES.md
      - Books & Reading: guides/BOOKS.md
      - Degoogle Guide: guides/DEGOOGLE.md

  - Reference:
      - Config Guide: CONFIG_GUIDE.md
      - Symlinks: SYMLINKS.md
