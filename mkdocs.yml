site_name: Džiugas' Dotfiles
site_description: Cross-platform dotfiles — macOS, Linux, and Windows. Claude Code setup, modern CLI tools, and development environment.
site_url: https://docs.peciulevicius.com

repo_name: peciulevicius/.dotfiles
repo_url: https://github.com/peciulevicius/.dotfiles

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
    - toc.follow

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Start Here: START_HERE.md

  - Mac:
      - macOS Setup: MAC_SETUP.md
      - Mac mini Setup: HOME_SERVER.md
      - Wallpapers: WALLPAPERS.md

  - Claude Code:
      - Claude Code Guide: CLAUDE_CODE_GUIDE.md
      - Business Stack: BUSINESS_STACK_GUIDE.md

  - Tools:
      - Modern CLI Tools: MODERN_CLI_TOOLS.md
      - Beginner Setup Guide: BEGINNER_TOOL_SETUP_GUIDE.md
      - Tmux: TMUX_GUIDE.md
      - Utility Scripts: UTILITY_SCRIPTS.md
      - Tutorials: tutorials/TOOL_TUTORIALS.md

  - Installation:
      - How to Install: HOW_TO_INSTALL.md
      - Arch Linux: ARCH_INSTALLER_FLOW.md

  - Self-Hosted:
      - Services Overview: SERVICES.md
      - Backup Strategy: BACKUPS.md
      - Notes & Obsidian: NOTES.md
      - Books & Reading: BOOKS.md
      - Degoogle Guide: DEGOOGLE.md

  - Reference:
      - Config Guide: CONFIG_GUIDE.md
      - Symlinks: SYMLINKS.md
      - Tool Coverage Matrix: TOOL_COVERAGE_MATRIX.md
      - Docs Site Setup: SETUP_DOCS_SITE.md
      - FAQ: FAQ.md
