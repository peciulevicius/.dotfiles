  - name: Feed
    columns:
      - size: small
        widgets:
          - type: search
            search-engine: duckduckgo

          - type: releases
            title: GitHub Releases
            repositories:
              - immich-app/immich
              - glanceapp/glance
              - dani-garcia/vaultwarden
              - jellyfin/jellyfin
              - karakeep/karakeep
            token: ${GITHUB_TOKEN}

          - type: lobsters

      - size: full
        widgets:
          - type: hacker-news
            limit: 15
            collapse-after: 5

          - type: reddit
            title: Tech
            subreddit: selfhosted+homelab+linux+programming+technology+webdev+typescript
            limit: 15
            collapse-after: 5

          - type: reddit
            title: Business
            subreddit: SaaS+startups+Entrepreneur+indiehackers
            limit: 15
            collapse-after: 5

          - type: reddit
            title: Lithuanian
            subreddit: lietuva+6nuliai
            limit: 15
            collapse-after: 5

      - size: small
        widgets:
          - type: rss
            title: Blogs & Essays
            limit: 15
            collapse-after: 5
            feeds:
              - url: https://www.saastr.com/feed/
                title: SaaStr
              - url: https://hnrss.org/show
                title: Show HN
              - url: https://feeds.feedburner.com/TheBlogOfAuthor
                title: Seth Godin
              - url: https://world.hey.com/dhh/feed.atom
                title: DHH

  - name: Media
    columns:
