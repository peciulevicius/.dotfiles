                  - title: Calibre-Web
                    url: https://books.peciulevicius.com
                    icon: si:calibreweb

          - type: releases
            title: Media App Updates
            repositories:
              - jellyfin/jellyfin
              - Sonarr/Sonarr
              - Radarr/Radarr
              - morpheus65535/bazarr
              - fallenbagel/jellyseerr
            token: ${GITHUB_TOKEN}

      - size: full
        widgets:
          - type: reddit
            title: What to Watch
            subreddit: NetflixBestOf+Documentaries+MovieSuggestions+television+movies
            limit: 15
            collapse-after: 5

          - type: reddit
            title: Piracy & Self-Hosted Media
            subreddit: Piracy+selfhosted+PleX+jellyfin
            limit: 10
            collapse-after: 5

  - name: Finance
    columns:
      - size: small
        widgets:
          - type: markets
            title: Portfolio
            markets:
              - symbol: BTC-EUR
                name: Bitcoin
              - symbol: ETH-EUR
                name: Ethereum
              - symbol: VUAA.DE
                name: VUAA (S&P 500)
              - symbol: VWCE.DE
                name: VWCE (All World)
              - symbol: AAPL
                name: Apple
              - symbol: GOOGL
                name: Google
              - symbol: AMZN
                name: Amazon
              - symbol: MSFT
                name: Microsoft
              - symbol: NVDA
                name: Nvidia
              - symbol: MSTR
                name: MicroStrategy

      - size: full
