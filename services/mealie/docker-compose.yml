# Mealie — recipe manager and meal planner
# Docs: https://github.com/mealie-recipes/mealie

name: mealie

services:
  mealie:
    container_name: mealie
    image: ghcr.io/mealie-recipes/mealie:v2.6.0
    restart: unless-stopped
    ports:
      - "${MEALIE_PORT:-9925}:9000"
    volumes:
      - ./data:/app/data
    environment:
      TZ: ${TZ:-Europe/Vilnius}
      ALLOW_SIGNUP: "true"
      BASE_URL: ${BASE_URL:-http://localhost:9925}
      MAX_WORKERS: 1
      WEB_CONCURRENCY: 1

networks:
  default:
    name: mealie
