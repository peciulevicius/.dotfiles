# Ollama — local LLM inference server
# Docs: https://ollama.com/

name: ollama

services:
  ollama:
    container_name: ollama
    image: ollama/ollama:0.6.8
    restart: unless-stopped
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    volumes:
      - ./data/models:/root/.ollama
    environment:
      OLLAMA_HOST: 0.0.0.0

networks:
  default:
    name: ollama
