# Karakeep — AI-powered bookmark manager (formerly Hoarder)
# Docs: https://docs.karakeep.app/Installation/docker
# Replaces: Linkwarden

name: karakeep

services:
  karakeep:
    container_name: karakeep
    image: ghcr.io/karakeep-app/karakeep:release
    restart: unless-stopped
    depends_on:
      - karakeep-chrome
      - meilisearch
    ports:
      - "${KARAKEEP_PORT:-3005}:3000"
    volumes:
      - ./data:/data
    environment:
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3005}
      MEILI_ADDR: http://meilisearch:7700
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      BROWSER_WEB_URL: http://karakeep-chrome:9222
      DATA_DIR: /data
      # Optional: AI tagging (comment out if not using)
      # OPENAI_API_KEY: ${OPENAI_API_KEY}
      # OPENAI_BASE_URL: ${OPENAI_BASE_URL}

  karakeep-chrome:
    container_name: karakeep-chrome
    image: gcr.io/zenika-hub/alpine-chrome:123
    restart: unless-stopped
    command: --no-sandbox --disable-gpu --disable-dev-shm-usage --remote-debugging-address=0.0.0.0 --remote-debugging-port=9222 --hide-scrollbars

  meilisearch:
    container_name: karakeep-meilisearch
    image: getmeili/meilisearch:v1.11.1
    restart: unless-stopped
    volumes:
      - ./meilisearch:/meili_data
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY}
      MEILI_NO_ANALYTICS: "true"
