# Homarr — home dashboard
# Docs: https://homarr.dev/docs/

name: homarr

services:
  homarr:
    container_name: homarr
    image: ghcr.io/ajnart/homarr:0.15.10
    restart: unless-stopped
    ports:
      - "${HOMARR_PORT:-7575}:7575"
    volumes:
      - ./data/configs:/app/data/configs
      - ./data/icons:/app/public/icons
      - ./data/data:/data
      - /var/run/docker.sock:/var/run/docker.sock

networks:
  default:
    name: homarr
