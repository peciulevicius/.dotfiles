# Bazarr — automated subtitle management for Sonarr & Radarr
# Docs: https://www.bazarr.media/

name: bazarr

services:
  bazarr:
    container_name: bazarr
    image: lscr.io/linuxserver/bazarr:1.5.1
    restart: unless-stopped
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    volumes:
      - ./data/config:/config
      - ${MEDIA_DIR:-/Volumes/T7/media}:/media
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Vilnius}

networks:
  default:
    name: media
