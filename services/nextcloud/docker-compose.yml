# Nextcloud — Google Drive / Docs replacement
# Docs: https://hub.docker.com/_/nextcloud

name: nextcloud

services:
  nextcloud-db:
    container_name: nextcloud_db
    image: mariadb:11.4
    restart: unless-stopped
    command: --transaction-isolation=READ-COMMITTED --log-bin=binlog --binlog-format=ROW
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD required}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
    volumes:
      - ./data/db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

  nextcloud:
    container_name: nextcloud
    image: nextcloud:30-apache
    restart: unless-stopped
    ports:
      - "${NC_PORT:-8080}:80"
    volumes:
      - ./data/nextcloud:/var/www/html
    environment:
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD required}
      MYSQL_DATABASE: nextcloud
      MYSQL_USER: nextcloud
      MYSQL_HOST: nextcloud-db
      NEXTCLOUD_ADMIN_USER: ${ADMIN_USER:-admin}
      NEXTCLOUD_ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD required}
      NEXTCLOUD_TRUSTED_DOMAINS: ${TRUSTED_DOMAINS:-localhost}
    depends_on:
      nextcloud-db:
        condition: service_healthy

networks:
  default:
    name: nextcloud
