# Calibre-Web — ebook library server
# Docs: https://github.com/janeczku/calibre-web

name: calibre-web

services:
  calibre-web:
    container_name: calibre_web
    image: lscr.io/linuxserver/calibre-web:0.6.24
    restart: unless-stopped
    ports:
      - "${CW_PORT:-8083}:8083"
    volumes:
      - ./data/config:/config
      - ${BOOKS_DIR:-./data/books}:/books
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Vilnius}
      DOCKER_MODS: linuxserver/mods:universal-calibre

networks:
  default:
    name: calibre-web
