# Sonarr + Radarr + Prowlarr — media automation stack
# Sonarr: TV show management — https://sonarr.tv
# Radarr: Movie management — https://radarr.video
# Prowlarr: Indexer manager — https://prowlarr.com

name: sonarr-radarr

services:
  sonarr:
    container_name: sonarr
    image: lscr.io/linuxserver/sonarr:4.0.14
    restart: unless-stopped
    ports:
      - "${SONARR_PORT:-8989}:8989"
    volumes:
      - ./data/sonarr:/config
      - ${MEDIA_DIR:-/Volumes/T7/media}:/media
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Vilnius}

  radarr:
    container_name: radarr
    image: lscr.io/linuxserver/radarr:5.18.4
    restart: unless-stopped
    ports:
      - "${RADARR_PORT:-7878}:7878"
    volumes:
      - ./data/radarr:/config
      - ${MEDIA_DIR:-/Volumes/T7/media}:/media
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Vilnius}

  prowlarr:
    container_name: prowlarr
    image: lscr.io/linuxserver/prowlarr:1.31.2
    restart: unless-stopped
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    volumes:
      - ./data/prowlarr:/config
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-Europe/Vilnius}

networks:
  default:
    name: media
